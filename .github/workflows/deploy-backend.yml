name: deploy-backend

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "deploy/README.md"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: boyzera-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_owner: ${{ steps.meta.outputs.owner_lc }}
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve lowercase owner
        id: meta
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE_OWNER="${{ needs.build-and-push.outputs.image_owner }}"
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

            cd /opt/boyzera

            # Persist new image coordinates in the on-server .env so any future
            # `docker compose` invocation picks them up.
            grep -q '^IMAGE_OWNER=' .env \
              && sed -i "s|^IMAGE_OWNER=.*|IMAGE_OWNER=${IMAGE_OWNER}|" .env \
              || echo "IMAGE_OWNER=${IMAGE_OWNER}" >> .env
            grep -q '^IMAGE_TAG=' .env \
              && sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env \
              || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
