# Reverse proxy for the BoyZera backend. Lives on the EC2 host at:
#   /etc/nginx/sites-available/api.boyzueira.com.conf
# Symlinked into /etc/nginx/sites-enabled/.
#
# Initially only the :80 block is needed. Run:
#   sudo certbot --nginx -d api.boyzueira.com
# and Certbot will add the :443 block + auto-redirect.

server {
    listen 80;
    listen [::]:80;
    server_name api.boyzueira.com;

    # Allow Telegram webhooks / file uploads up to 10 MB.
    client_max_body_size 10m;

    # Health/uptime probes hit the backend directly via this proxy.
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;

        # Preserve the client view of the request.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / SSE support (cheap to leave on).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Generous timeouts for long-poll endpoints.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Don't buffer streaming responses.
        proxy_buffering off;
    }

    # Lightweight access logging — Certbot's HTTPS block will inherit a separate one.
    access_log /var/log/nginx/api.boyzueira.com.access.log;
    error_log  /var/log/nginx/api.boyzueira.com.error.log warn;
}
